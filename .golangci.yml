run:
  timeout: 2m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - gocritic

linters-settings:
  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch

issues:
  exclude-dirs:
    - bin
