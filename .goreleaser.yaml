version: 2

project_name: nordvpn-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: nordvpn-tui
    main: ./cmd/nordvpn-tui
    binary: nordvpn-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

nfpms:
  - id: packages
    package_name: nordvpn-tui
    vendor: Simon Winther
    homepage: https://github.com/simonwinther/nordvpn-tui
    maintainer: Simon Winther <simonwa01@gmail.com>
    description: Keyboard-first terminal UI for NordVPN on Linux
    license: MIT
    formats:
      - deb
    recommends:
      - nordvpn
    contents:
      - src: LICENSE
        dst: /usr/share/doc/nordvpn-tui/LICENSE
        file_info:
          mode: 0644

# AUR publishing for nordvpn-tui-bin.
# Requires AUR_SSH_PRIVATE_KEY secret; upload is skipped when the secret is absent.
aurs:
  - name: nordvpn-tui-bin
    homepage: https://github.com/simonwinther/nordvpn-tui
    description: Keyboard-first terminal UI for NordVPN on Linux
    maintainers:
      - Simon Winther <simonwa01@gmail.com>
    license: MIT
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/nordvpn-tui-bin.git"
    skip_upload: '{{ if .Env.AUR_SSH_PRIVATE_KEY }}false{{ else }}true{{ end }}'
    depends:
      - nordvpn
    provides:
      - nordvpn-tui
    conflicts:
      - nordvpn-tui
    package: |-
      install -Dm755 "./nordvpn-tui" "${pkgdir}/usr/bin/nordvpn-tui"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/nordvpn-tui-bin/LICENSE"

release:
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
